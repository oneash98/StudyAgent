name: study-agent

services:
  mcp-server:
    build:
      context: .
    image: study-agent
    env_file:
      - .env
    environment:
      STUDY_AGENT_HOST_GATEWAY: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8790:8790"
    volumes:
      - ./data/phenotype_index:/data/phenotype_index
    command: ["micromamba", "run", "-n", "base", "study-agent-mcp"]
    restart: unless-stopped

  acp-agent:
    build:
      context: .
    image: study-agent
    env_file:
      - .env
    environment:
      STUDY_AGENT_HOST_GATEWAY: host.docker.internal
      STUDY_AGENT_MCP_URL: http://mcp-server:8790/mcp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8765:8765"
    depends_on:
      - mcp-server
    command: ["micromamba", "run", "-n", "base", "study-agent-acp"]
    restart: unless-stopped
