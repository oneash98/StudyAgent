services:
  _note:
    description: >
      This registry is used by ACP /services. Entries are marked implemented=true/false
      at runtime; ACP may also append services missing from this registry and emit
      warnings for any drift.

  phenotype_recommendation:
    endpoint: /flows/phenotype_recommendation
    mcp_tools:
      - phenotype_search
      - phenotype_prompt_bundle
    input:
      - study_intent
      - top_k
      - max_results
      - candidate_limit
    output:
      - recommendations
      - candidate_count
      - candidate_limit
    validation:
      - core.phenotype_recommendations filters to allowed cohortIds
      - user confirmation before any writes

  phenotype_improvements:
    endpoint: /flows/phenotype_improvements
    mcp_tools:
      - phenotype_improvements
    input:
      - protocol_text
      - cohort (single)
      - characterization_previews
    output:
      - phenotype_improvements
      - code_suggestion
    validation:
      - core.phenotype_improvements filters to allowed cohortIds
      - user confirmation before any writes

  concept_sets_review:
    endpoint: /flows/concept_sets_review
    mcp_tools:
      - propose_concept_set_diff
    input:
      - concept_set
      - study_intent
    output:
      - findings
      - patches
      - actions
    validation:
      - core.propose_concept_set_diff deterministic checks
      - user confirmation before any writes

  cohort_critique_general_design:
    endpoint: /flows/cohort_critique_general_design
    mcp_tools:
      - cohort_lint
    input:
      - cohort
    output:
      - findings
      - patches
      - actions
    validation:
      - core.cohort_lint deterministic checks
      - user confirmation before any writes

  phenotype_validation_review:
    endpoint: /flows/phenotype_validation_review
    mcp_tools:
      - keeper_prompt_bundle
      - keeper_sanitize_row
      - keeper_build_prompt
      - keeper_parse_response
    input:
      - keeper_row (single patient)
      - disease_name
    output:
      - label
      - rationale
    validation:
      - PHI/PII fail-closed sanitation (HIPAA 18)
      - output label constrained to yes/no/unknown

  keeper_concept_sets_generate:
    endpoint: /flows/keeper_concept_sets_generate
    mcp_tools:
      - keeper_concept_set_bundle
      - vocab_search_standard
      - vocab_filter_standard_concepts
      - vocab_remove_descendants
      - phoebe_related_concepts
      - vocab_add_nonchildren
      - vocab_fetch_concepts
    input:
      - phenotype
      - domain_keys
      - vocab_search_provider
      - phoebe_provider
      - candidate_limit
      - min_record_count
    output:
      - concept_sets
      - domains
      - diagnostics
    validation:
      - no patient-level data permitted in prompts
      - concepts normalized against OMOP vocabulary

  keeper_profiles_generate:
    endpoint: /flows/keeper_profiles_generate
    mcp_tools:
      - keeper_profile_extract
      - keeper_profile_to_rows
      - keeper_sanitize_profile_row
    input:
      - cohort_database_schema
      - cohort_table
      - cohort_definition_id
      - cdm_database_schema
      - sample_size
      - person_ids
      - keeper_concept_sets
      - use_descendants
      - remove_pii
    output:
      - rows
      - row_count
      - sample_size_requested
      - sample_size_returned
      - diagnostics
    validation:
      - deterministic only, no LLM callouts
      - PHI/PII retained only inside local extraction boundary
      - downstream LLM use requires explicit sanitization gate

  phenotype_recommendation_advice:
    endpoint: /flows/phenotype_recommendation_advice
    mcp_tools:
      - phenotype_recommendation_advice
    input:
      - study_intent
    output:
      - advice
      - next_steps
      - questions
    validation:
      - core.phenotype_recommendation_advice schema validation

  phenotype_intent_split:
    endpoint: /flows/phenotype_intent_split
    mcp_tools:
      - phenotype_intent_split
    input:
      - study_intent
    output:
      - target_statement
      - outcome_statement
      - rationale
      - questions
    validation:
      - core.phenotype_intent_split schema validation

  cohort_methods_specifications_recommendation:
    endpoint: /flows/cohort_methods_specifications_recommendation
    mcp_tools:
      - cohort_methods_prompt_bundle
    input:
      - analytic_settings_description
      - study_intent
      - current_specifications
      - cohort_definitions
      - negative_control_concept_set
      - covariate_selection
    output:
      - specifications
      - sectionRationales
      - diagnostics
    validation:
      - core.theseus_validation.validate_theseus_spec (top-level structure)
      - core.theseus_validation.validate_section (enum + range checks)
      - core.theseus_validation.merge_client_metadata (client IDs override LLM)
      - core.theseus_validation.backfill_section_from_defaults (per-section fallback)
